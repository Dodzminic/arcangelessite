<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FILVAULT | Security Clearance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --charcoal: #1e272e; --blue: #74b9ff; --dark: #2f3542; }
        body { background-color: var(--charcoal); font-family: 'Plus Jakarta Sans', sans-serif; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .glass-card { background: var(--dark); border-radius: 30px; padding: 40px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.05); }
        .input-group-custom { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .input-group-custom input, .input-group-custom select { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-blue { background: var(--blue); color: var(--charcoal); border-radius: 50px; font-weight: 800; border: none; padding: 15px; width: 100%; transition: 0.3s; }
        .btn-blue:disabled { opacity: 0.3; cursor: not-allowed; }
        .error-msg { color: var(--blue); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: -15px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 class="fw-800 mb-4 text-center">FIL<span style="color: var(--blue);">VAULT</span></h2>
        <p class="text-center small opacity-50 mb-4">// {{ title|upper }}</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="input-group-custom">
                <input type="text" name="username" value="{{ u.username }}" placeholder="Identity Name" required>
            </div>
            <div class="input-group-custom">
                <input type="email" id="email-field" name="email" value="{{ u.email }}" placeholder="Secure Email" required>
            </div>
            <div id="email-warn" class="error-msg ms-3"><i class="bi bi-exclamation-triangle"></i> Email already authorized</div>

            <div class="input-group-custom">
                <select name="gender" required>
                    <option value="" disabled selected>Select Category</option>
                    {% for g in genders %}<option value="{{ g.id }}" {% if u.gender.id == g.id %}selected{% endif %}>{{ g.gender }}</option>{% endfor %}
                </select>
            </div>

            <div class="input-group-custom">
                <input type="password" id="p1" name="password" placeholder="Access Password" {% if not u %}required{% endif %}>
            </div>
            <div class="input-group-custom">
                <input type="password" id="p2" name="confirm_password" placeholder="Verify Password" {% if not u %}required{% endif %}>
            </div>
            <div id="pass-warn" class="error-msg ms-3"><i class="bi bi-shield-lock"></i> Passwords do not match</div>

            <div class="mb-4 small opacity-50">
                <label class="mb-2">Biometric Image Update</label>
                <input type="file" name="profile_pic" class="form-control form-control-sm bg-transparent text-white border-secondary">
            </div>

            <button type="submit" id="submitBtn" class="btn-blue shadow">Execute Sync</button>
            <a href="{% url 'user_list' %}" class="btn btn-link w-100 text-white opacity-50 small mt-3 text-decoration-none">Cancel Request</a>
        </form>
    </div>

    <script>
        const p1 = document.getElementById('p1'), p2 = document.getElementById('p2'), 
              emailField = document.getElementById('email-field'), btn = document.getElementById('submitBtn'),
              emailWarn = document.getElementById('email-warn'), passWarn = document.getElementById('pass-warn');
        const userId = "{{ u.id|default:'' }}";

        function validate() {
            const match = p1.value === p2.value || p2.value === "";
            passWarn.style.display = match ? 'none' : 'block';
            return match;
        }

        emailField.onkeyup = function() {
            fetch(`/check-email/?email=${this.value}&user_id=${userId}`)
                .then(res => res.json()).then(data => {
                    emailWarn.style.display = data.is_taken ? 'block' : 'none';
                    btn.disabled = data.is_taken || !validate();
                });
        };
        p2.onkeyup = () => { btn.disabled = !validate(); };
    </script>
</body>
</html>
