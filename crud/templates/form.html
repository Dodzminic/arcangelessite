<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5" style="background-color: #f8f9fa;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- The enctype is required for your 25% Profile Picture grade -->
            <form method="POST" enctype="multipart/form-data" class="p-4 shadow rounded bg-white">
                {% csrf_token %}
                <div class="bg-primary" style="height: 10px; margin: -24px -24px 20px -24px; border-radius: 4px 4px 0 0;"></div>
                
                <h3 class="mb-4 text-dark">{{ title }}</h3>
                
                <!-- This specific line is what's missing! It renders your form fields -->
                <div class="text-dark">
                    {{ form.as_p }}
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success me-2">Save User Data</button>
                    <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
