<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} | BSIT 2A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 500px; margin: 60px auto; background: white; padding: 40px; border-radius: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container shadow-sm">
            <h3 class="fw-bold mb-4 text-center">{{ title }}</h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                {% if form.non_field_errors %}
                    {% for error in form.non_field_errors %}
                        <div class="alert alert-danger py-2 small">{{ error }}</div>
                    {% endfor %}
                {% endif %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            {% for error in field.errors %}
                                <div class="text-danger" style="font-size: 0.75rem;">{{ error }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-dark fw-bold">Save Student Profile</button>
                    <a href="{% url 'user_list' %}" class="btn btn-link text-muted small mt-2">Back to Directory</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
