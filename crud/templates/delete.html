{% extends 'index.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm border-danger mx-auto" style="max-width: 500px;">
        <div class="card-body text-center">
            <h4 class="card-title text-danger">Delete User?</h4>
            <p class="card-text">Are you sure you want to delete <strong>{{ user.username }}</strong>? This action cannot be undone.</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
